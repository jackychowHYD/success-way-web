        /* Background Styling: 50% transparency overlay + background image */
        body { 
            background-image: linear-gradient(rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.5)),

            padding: 50px 5%; max-width: 900px; margin: 100px auto;
            text-align: center; text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
        }

        .sub-title { font-size: 1.25rem; color: #333; margin-bottom: 30px; font-weight: 600; }

            display: inline-block; padding: 15px 30px; background-color: #b71c1c;
            color: white; text-decoration: none; border-radius: 5px; font-weight: bold;
        }
        .contact-btn:hover { background-color: #8e1515; }

</head>
